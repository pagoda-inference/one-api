name: Build and Deploy to K8s

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag'
        required: false
        default: ''

env:
  REGISTRY: registry.your-company.com
  IMAGE_NAME: one-api

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Extract version
        id: version
        run: |
          TAG=${GITHUB_REF#refs/heads/}
          if [ -n "${{ github.event.inputs.image_tag }}" ]; then
            TAG=${{ github.event.inputs.image_tag }}
          fi
          echo "TAG=$TAG" >> $GITHUB_OUTPUT
          echo "SHORT_SHA=${GITHUB_SHA:0:8}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.k8s
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.TAG }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.SHORT_SHA }}

      - name: Update K8s deployment
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: k8s湿润/kubectl-action@v1
        with:
          kubeconfig: ${{ secrets.KUBE_CONFIG }}
          namespace: one-api
          command: |
            kubectl set image deployment/one-api \
              one-api=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.SHORT_SHA }}

      - name: Verify deployment
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          kubectl rollout status deployment/one-api -n one-api --timeout=300s
