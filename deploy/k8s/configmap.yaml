apiVersion: v1
kind: ConfigMap
metadata:
  name: one-api-config
  namespace: baota
data:
  # Server
  PORT: "3000"
  SERVER_ADDRESS: "https://baotaai.bedicloud.net"
  GIN_MODE: "release"
  TZ: "Asia/Shanghai"

  # Database (PostgreSQL) - 使用占位符，会通过env注入
  # 注意：DSN 必须以 postgres:// 开头才会被识别为 PostgreSQL
  SQL_DSN: "postgres://postgres:PLACEHOLDER@10.1.112.239:34001/postgres?sslmode=require"

  # Redis
  REDIS_CONN_STRING: "redis://:PLACEHOLDER@10.1.112.239:34000"
  MEMORY_CACHE_ENABLED: "true"

  # Session - 使用占位符，会通过env注入
  SESSION_SECRET: "PLACEHOLDER"

  # OAuth - Feishu
  LarkClientId: "cli_a94c9bd14ef95bd2"
  # LarkClientSecret is in Secret

  # Security - 关闭密码登录，仅使用飞书SSO
  PasswordLoginEnabled: "false"
  PasswordRegisterEnabled: "false"
  RegisterEnabled: "false"
  EmailVerificationEnabled: "false"

  # Theme
  THEME: "default"

  # Rate Limit
  GLOBAL_API_RATE_LIMIT: "480"
  GLOBAL_WEB_RATE_LIMIT: "240"

  # MinIO / S3 Object Storage
  MINIO_ENABLED: "true"
  MINIO_ENDPOINT: "10.99.149.154:9000"
  MINIO_ACCESS_KEY: "minio"
  MINIO_SECRET_KEY: "Baota1234.com"
  MINIO_BUCKET: "minio-test"
  MINIO_PUBLIC_BASE_URL: "http://10.1.112.239:35001/minio-test"
  MINIO_USE_SSL: "false"
