apiVersion: v1
kind: Secret
metadata:
  name: one-api-secret
  namespace: baota
type: Opaque
stringData:
  # PostgreSQL 密码
  ONEAPI_DB_PASSWORD: "${ONEAPI_DB_PASSWORD}"

  # Redis 密码
  ONEAPI_REDIS_PASSWORD: "${ONEAPI_REDIS_PASSWORD}"

  # 会话密钥 (随机字符串，至少32字符)
  ONEAPI_SESSION_SECRET: "${ONEAPI_SESSION_SECRET}"

  # 飞书 OAuth App Secret
  ONEAPI_LARK_CLIENT_SECRET: "${ONEAPI_LARK_CLIENT_SECRET}"
