# 注意: 此文件是配置模板，请勿直接 kubectl apply
# 请使用以下方式创建 Secret:
#   kubectl create secret generic one-api-secret \
#     --namespace=baota \
#     --from-literal=ONEAPI_DB_PASSWORD=$ONEAPI_DB_PASSWORD \
#     --from-literal=ONEAPI_REDIS_PASSWORD=$ONEAPI_REDIS_PASSWORD \
#     --from-literal=ONEAPI_SESSION_SECRET=$ONEAPI_SESSION_SECRET \
#     --from-literal=ONEAPI_LARK_CLIENT_SECRET=$ONEAPI_LARK_CLIENT_SECRET
#
# 或使用 Makefile: make secret

apiVersion: v1
kind: Secret
metadata:
  name: one-api-secret
  namespace: baota
type: Opaque
stringData:
  # PostgreSQL DSN (使用 postgres:// 协议，支持 SSL)
  SQL_DSN: "postgres://postgres:${ONEAPI_DB_PASSWORD}@10.1.112.239:34001/postgres?sslmode=require"

  # Redis connection string
  REDIS_CONN_STRING: "redis://:${ONEAPI_REDIS_PASSWORD}@10.1.112.239:34000"

  # Session密钥
  SESSION_SECRET: "${ONEAPI_SESSION_SECRET}"

  # 飞书 OAuth App Secret
  LarkClientSecret: "${ONEAPI_LARK_CLIENT_SECRET}"
